# 运行模式: monitor (监控交易) / analyzer (市场分析)
run_mode: monitor

# 币安API配置
binance:
  api_key: your_binance_api_key
  api_secret: your_binance_api_secret
  testnet: true
  # 代理配置（可选，国内访问币安需要代理）
  proxy:
    http: ""
    https: ""

# 交易配置
trading:
  # 多交易对配置
  symbols:
    BNBUSDT:
      leverage: 10
      position_size: 0.001
      strategy: trend_following
      strategy_params:
        period: 14
        multiplier: 2

    BTCUSDT:
      leverage: 5
      position_size: 0.001
      strategy: mean_reversion
      strategy_params:
        period: 20
        std_dev_multiplier: 2

  # 信号输出方式: 支持多选 [console, dingtalk, feishu]
  # 示例: [console] 或 [dingtalk] 或 [console, dingtalk, feishu]
  signal_output:
    - console

# 策略配置
strategies:
  trend_following:
    period: 14
    multiplier: 2

  mean_reversion:
    period: 20
    std_dev_multiplier: 2

  turtle_trading:
    entry_period: 20
    exit_period: 10

# 通知配置
notifications:
  dingtalk:
    webhook_url: https://oapi.dingtalk.com/robot/send?access_token=your_token
    secret: your_secret
  feishu:
    webhook_url: https://open.feishu.cn/open-apis/bot/v2/hook/your_webhook_url
    secret: your_sign_secret

# 日志配置
logging:
  level: INFO
  file: logs/trading.log

# LLM 分析配置
llm:
  enabled: false  # 是否启用LLM分析
  api_key: ""    # MiniMax API Key
  base_url: "https://api.minimax.chat/v1"  # API地址
  model: "Claude Opus-4.6"  # 模型名称
  style: "基本面+技术面"  # 分析风格
  # 代理配置（可选）
  proxy:
    http: ""
    https: ""

# K线数据获取配置
market_data:
  interval: "1h"  # K线周期
  limit: 100      # 获取数量
